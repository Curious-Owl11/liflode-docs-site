name: Deploy to Cloudflare Pages

# Deploys the Astro Starlight docs site to Cloudflare Pages on push to main.
# Preview deployments are created automatically for all pull requests.
#
# Required GitHub secrets:
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare account ID (from Infisical --env=prod)
#   CLOUDFLARE_API_TOKEN   - Cloudflare API token with Pages:Edit permission (from Infisical --env=prod)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=liflode-docs-site --commit-dirty=true
