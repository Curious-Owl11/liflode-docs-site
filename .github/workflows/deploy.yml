name: Deploy to Cloudflare Pages

# Deploys the Astro Starlight docs site to Cloudflare Pages on push to main.
# Preview deployments are created automatically for all pull requests.
#
# Required GitHub secrets:
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare account ID (CF_ACCOUNT_ID in Infisical dev)
#   CLOUDFLARE_API_TOKEN   - Cloudflare API token with Pages:Edit permission
#                            Create at: https://dash.cloudflare.com/profile/api-tokens
#                            Template: "Edit Cloudflare Workers" or custom with Cloudflare Pages:Edit
#                            Save to Infisical dev as CLOUDFLARE_PAGES_TOKEN

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PROJECT_NAME: liflode-docs-site
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.PROJECT_NAME }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
